# ── Risk Platform: Amazon DynamoDB (AWS Cloud) ───────────────
hyperscaledb.provider=dynamo
hyperscaledb.connection.region=us-east-1
# No endpoint configured — SDK connects to the real AWS DynamoDB service.
# No explicit credentials — SDK uses the default AWS credential provider chain:
#   1. Environment variables (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
#   2. AWS shared credentials file (~/.aws/credentials)
#   3. IAM role for EC2/ECS/Lambda (instance profile / task role)
# Run 'aws configure' to set up credentials for local development.
