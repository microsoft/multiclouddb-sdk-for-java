# ═══════════════════════════════════════════════════════════════════════════════
# Hyperscale DB TODO App — Spanner Emulator Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:  -Dtodo.config=todo-app-spanner.properties
#
# Prerequisites:
#   docker run -p 9010:9010 -p 9020:9020 gcr.io/cloud-spanner-emulator/emulator
#   Then create instance + database (see hyperscaledb-samples/README.md).
#
hyperscaledb.provider=spanner

# ─── Application Settings ─────────────────────────────────────────────────────
hyperscaledb.database=testdb
hyperscaledb.collection=todos

# ─── Google Cloud Spanner (Emulator) ─────────────────────────────────────────
hyperscaledb.connection.projectId=test-project
hyperscaledb.connection.instanceId=test-instance
hyperscaledb.connection.databaseId=todoapp
hyperscaledb.connection.emulatorHost=localhost:9010
