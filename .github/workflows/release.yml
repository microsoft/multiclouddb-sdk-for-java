name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # e.g. v0.1.0, v1.0.0-beta.1

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # create GitHub Release & upload assets
  actions: read

jobs:

  # ──────────────────────────────────────────────────────────
  #  Gate 1 — Unit tests
  # ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        run: mvn verify -Punit

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  Gate 2 — Cosmos DB emulator integration tests
  # ──────────────────────────────────────────────────────────
  emulator-cosmos:
    name: Cosmos DB Emulator Tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Start Azure Cosmos DB Emulator
        shell: pwsh
        run: |
          Write-Host "Launching Azure Cosmos DB Emulator"
          Import-Module "$env:ProgramFiles\Azure Cosmos DB Emulator\PSModules\Microsoft.Azure.CosmosDB.Emulator"
          Start-CosmosDbEmulator -NoUI -Key "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          Write-Host "Cosmos DB Emulator is running"

      - name: Import Cosmos DB Emulator certificate into JDK truststore
        shell: pwsh
        run: |
          $certFile = "$env:TEMP\cosmos-emulator-root.cer"
          $keystore  = "$env:JAVA_HOME\lib\security\cacerts"
          $keytool   = "$env:JAVA_HOME\bin\keytool.exe"

          Write-Host "Waiting for emulator Root CA in Cert:\LocalMachine\Root ..."
          $deadline = (Get-Date).AddSeconds(60)
          $cert = $null
          while (-not $cert -and (Get-Date) -lt $deadline) {
              $cert = Get-ChildItem Cert:\LocalMachine\Root | Where-Object {
                  $_.FriendlyName -like "*DocumentDb*" -or
                  $_.FriendlyName -like "*CosmosDb*"   -or
                  $_.Subject       -like "*DocumentDb*"
              } | Select-Object -First 1
              if (-not $cert) { Start-Sleep -Seconds 3 }
          }

          if (-not $cert) {
              Write-Host "Root store contents:"
              Get-ChildItem Cert:\LocalMachine\Root | Select-Object Subject, FriendlyName | Format-Table
              Write-Host "My store contents:"
              Get-ChildItem Cert:\LocalMachine\My   | Select-Object Subject, FriendlyName | Format-Table
              Write-Error "Cosmos DB emulator Root CA not found after 60 s"
              exit 1
          }

          Write-Host "Found Root CA: Subject=$($cert.Subject) FriendlyName=$($cert.FriendlyName)"
          Export-Certificate -Cert $cert -FilePath $certFile -Type CERT
          Write-Host "Exported to $certFile"

          & $keytool -importcert -noprompt -trustcacerts `
              -alias CosmosDbEmulatorRootCA `
              -file $certFile `
              -keystore $keystore `
              -storepass changeit
          Write-Host "Root CA imported into JDK truststore successfully"

      - name: Create test database and container
        shell: pwsh
        run: |
          $masterKey = "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          $endpoint  = "https://localhost:8081"

          function Get-CosmosAuthHeader([string]$verb, [string]$resourceType, [string]$resourceLink, [string]$date, [string]$key) {
              $keyBytes = [System.Convert]::FromBase64String($key)
              $text     = "$($verb.ToLowerInvariant())`n$($resourceType.ToLowerInvariant())`n$resourceLink`n$($date.ToLowerInvariant())`n`n"
              $hmac     = New-Object System.Security.Cryptography.HMACSHA256
              $hmac.Key = $keyBytes
              $sig      = [System.Convert]::ToBase64String($hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($text)))
              return [uri]::EscapeDataString("type=master&ver=1.0&sig=$sig")
          }

          function Invoke-CosmosApi([string]$verb, [string]$url, [string]$resourceType, [string]$resourceLink, [string]$body) {
              $date    = [DateTime]::UtcNow.ToString("r")
              $auth    = Get-CosmosAuthHeader $verb $resourceType $resourceLink $date $masterKey
              $headers = @{ "Authorization" = $auth; "x-ms-date" = $date; "x-ms-version" = "2018-12-31" }
              try {
                  Invoke-RestMethod -Uri $url -Method $verb -Headers $headers -Body $body `
                      -ContentType "application/json" -SkipCertificateCheck
                  Write-Host "  Created successfully"
              } catch {
                  if ($_.Exception.Response.StatusCode.value__ -eq 409) {
                      Write-Host "  Already exists (409) - OK"
                  } else { throw }
              }
          }

          Write-Host "Creating database 'todoapp'..."
          Invoke-CosmosApi "POST" "$endpoint/dbs" "dbs" "" '{"id":"todoapp"}'

          Write-Host "Creating container 'todos' (partition key: /partitionKey)..."
          Invoke-CosmosApi "POST" "$endpoint/dbs/todoapp/colls" "colls" "dbs/todoapp" `
              '{"id":"todos","partitionKey":{"paths":["/partitionKey"],"kind":"Hash","Version":2}}'

          Write-Host "Test database and container are ready"

      - name: Run Cosmos DB integration tests
        shell: bash
        run: |
          mvn verify -Pemulator-cosmos -pl hyperscaledb-conformance -am \
            -Djunit.jupiter.execution.timeout.default=60s

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  Gate 3 — DynamoDB Local integration tests
  # ──────────────────────────────────────────────────────────
  emulator-dynamo:
    name: DynamoDB Local Tests
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Wait for DynamoDB Local
        run: |
          echo "Waiting for DynamoDB Local to be ready..."
          timeout 60 bash -c '
            until curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null | grep -q "400\|200"; do
              echo "  Not ready yet, retrying in 2s..."
              sleep 2
            done
          '
          echo "DynamoDB Local is ready"

      - name: Run DynamoDB integration tests
        run: mvn verify -Pemulator-dynamo -pl hyperscaledb-conformance -am

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  Publish — runs only after all gates pass
  # ──────────────────────────────────────────────────────────
  publish:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    needs: [unit-tests, emulator-cosmos, emulator-dynamo]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (from tag: $TAG)"

      - name: Set Maven version from tag
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build and stage release artifacts
        run: |
          mvn deploy -DskipTests \
            -DaltDeploymentRepository=local::default::file://${{ github.workspace }}/staging

      - name: Verify required artifacts
        run: |
          FULL_MODULES="hyperscaledb-api hyperscaledb-provider-cosmos hyperscaledb-provider-dynamo hyperscaledb-provider-spanner"
          VERSION="${{ steps.version.outputs.version }}"
          ERRORS=0

          check_artifact() {
            local module=$1 type=$2 path=$3
            if [ -z "$path" ]; then
              echo "::error::Missing ${module} ${type} artifact"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ ${type}: $(basename "$path")"
            fi
          }

          for module in $FULL_MODULES; do
            echo "--- Checking $module ---"
            check_artifact "$module" pom     "$(find staging -path "*/${module}/*.pom" 2>/dev/null | head -1)"
            check_artifact "$module" jar     "$(find staging -path "*/${module}/*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1)"
            check_artifact "$module" sources "$(find staging -path "*/${module}/*-sources.jar" 2>/dev/null | head -1)"
            check_artifact "$module" javadoc "$(find staging -path "*/${module}/*-javadoc.jar" 2>/dev/null | head -1)"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} required artifact(s) missing"
            exit 1
          fi
          echo ""
          echo "All required artifacts verified for version $VERSION"

      - name: Collect release JARs
        run: |
          mkdir -p release-jars
          MODULES="hyperscaledb-api hyperscaledb-provider-cosmos hyperscaledb-provider-dynamo hyperscaledb-provider-spanner"
          for module in $MODULES; do
            cp "$module/target/$module-${{ steps.version.outputs.version }}.jar" release-jars/
            cp "$module/target/$module-${{ steps.version.outputs.version }}-sources.jar" release-jars/
            cp "$module/target/$module-${{ steps.version.outputs.version }}-javadoc.jar" release-jars/
          done
          echo "Release JARs:"
          ls -la release-jars/

      - name: Upload staging repository
        uses: actions/upload-artifact@v4
        with:
          name: maven-staging-${{ steps.version.outputs.version }}
          path: staging/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-jars/*
          fail_on_unmatched_files: true
