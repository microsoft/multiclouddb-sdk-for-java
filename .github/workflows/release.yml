name: Release

on:
  push:
    tags:
      - 'hyperscaledb-*-v[0-9]*.[0-9]*.[0-9]*'              # stable: hyperscaledb-api-v1.2.3
      - 'hyperscaledb-*-v[0-9]*.[0-9]*.[0-9]*-beta.[0-9]*'  # beta:   hyperscaledb-api-v1.2.3-beta.1

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # create GitHub Release & upload assets
  actions: read

jobs:

  # ──────────────────────────────────────────────────────────
  #  Parse — extract module name and version from the tag
  # ──────────────────────────────────────────────────────────
  parse-tag:
    name: Parse Release Tag
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.parse.outputs.module }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse module and version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract version: everything after the last '-v'
          VERSION=$(echo "$TAG" | sed 's/.*-v//')
          # Extract module: everything before the last '-v'
          MODULE=$(echo "$TAG" | sed 's/-v[^v]*$//')

          VALID_MODULES="hyperscaledb-api hyperscaledb-provider-cosmos hyperscaledb-provider-dynamo hyperscaledb-provider-spanner"
          if ! echo "$VALID_MODULES" | grep -qw "$MODULE"; then
            echo "::error::Unknown module '$MODULE' in tag '$TAG'. Valid modules: $VALID_MODULES"
            exit 1
          fi

          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $MODULE version $VERSION (tag: $TAG)"

  # ──────────────────────────────────────────────────────────
  #  Gate 1 — Unit tests (always runs)
  # ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [parse-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        run: mvn verify -Punit

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/surefire-reports/**'
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  #  Gate 2 — Cosmos DB emulator (only for api and provider-cosmos)
  # ──────────────────────────────────────────────────────────
  emulator-cosmos:
    name: Cosmos DB Emulator Tests
    runs-on: windows-latest
    needs: [parse-tag]
    if: contains(fromJSON('["hyperscaledb-api","hyperscaledb-provider-cosmos"]'), needs.parse-tag.outputs.module)
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Start Azure Cosmos DB Emulator
        shell: pwsh
        run: |
          Write-Host "Launching Azure Cosmos DB Emulator"
          Import-Module "$env:ProgramFiles\Azure Cosmos DB Emulator\PSModules\Microsoft.Azure.CosmosDB.Emulator"
          Start-CosmosDbEmulator -NoUI -Key "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          Write-Host "Cosmos DB Emulator is running"

      - name: Import Cosmos DB Emulator certificate into JDK truststore
        shell: pwsh
        run: |
          $certFile = "$env:TEMP\cosmos-emulator-root.cer"
          $keystore  = "$env:JAVA_HOME\lib\security\cacerts"
          $keytool   = "$env:JAVA_HOME\bin\keytool.exe"

          Write-Host "Waiting for emulator Root CA in Cert:\LocalMachine\Root ..."
          $deadline = (Get-Date).AddSeconds(60)
          $cert = $null
          while (-not $cert -and (Get-Date) -lt $deadline) {
              $cert = Get-ChildItem Cert:\LocalMachine\Root | Where-Object {
                  $_.FriendlyName -like "*DocumentDb*" -or
                  $_.FriendlyName -like "*CosmosDb*"   -or
                  $_.Subject       -like "*DocumentDb*"
              } | Select-Object -First 1
              if (-not $cert) { Start-Sleep -Seconds 3 }
          }

          if (-not $cert) {
              Write-Host "Root store contents:"
              Get-ChildItem Cert:\LocalMachine\Root | Select-Object Subject, FriendlyName | Format-Table
              Write-Host "My store contents:"
              Get-ChildItem Cert:\LocalMachine\My   | Select-Object Subject, FriendlyName | Format-Table
              Write-Error "Cosmos DB emulator Root CA not found after 60 s"
              exit 1
          }

          Write-Host "Found Root CA: Subject=$($cert.Subject) FriendlyName=$($cert.FriendlyName)"
          Export-Certificate -Cert $cert -FilePath $certFile -Type CERT
          Write-Host "Exported to $certFile"

          & $keytool -importcert -noprompt -trustcacerts `
              -alias CosmosDbEmulatorRootCA `
              -file $certFile `
              -keystore $keystore `
              -storepass changeit
          Write-Host "Root CA imported into JDK truststore successfully"

      - name: Create test database and container
        shell: pwsh
        run: |
          $masterKey = "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          $endpoint  = "https://localhost:8081"

          function Get-CosmosAuthHeader([string]$verb, [string]$resourceType, [string]$resourceLink, [string]$date, [string]$key) {
              $keyBytes = [System.Convert]::FromBase64String($key)
              $text     = "$($verb.ToLowerInvariant())`n$($resourceType.ToLowerInvariant())`n$resourceLink`n$($date.ToLowerInvariant())`n`n"
              $hmac     = New-Object System.Security.Cryptography.HMACSHA256
              $hmac.Key = $keyBytes
              $sig      = [System.Convert]::ToBase64String($hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($text)))
              return [uri]::EscapeDataString("type=master&ver=1.0&sig=$sig")
          }

          function Invoke-CosmosApi([string]$verb, [string]$url, [string]$resourceType, [string]$resourceLink, [string]$body) {
              $date    = [DateTime]::UtcNow.ToString("r")
              $auth    = Get-CosmosAuthHeader $verb $resourceType $resourceLink $date $masterKey
              $headers = @{ "Authorization" = $auth; "x-ms-date" = $date; "x-ms-version" = "2018-12-31" }
              try {
                  Invoke-RestMethod -Uri $url -Method $verb -Headers $headers -Body $body `
                      -ContentType "application/json" -SkipCertificateCheck
                  Write-Host "  Created successfully"
              } catch {
                  if ($_.Exception.Response.StatusCode.value__ -eq 409) {
                      Write-Host "  Already exists (409) - OK"
                  } else { throw }
              }
          }

          Write-Host "Creating database 'todoapp'..."
          Invoke-CosmosApi "POST" "$endpoint/dbs" "dbs" "" '{"id":"todoapp"}'

          Write-Host "Creating container 'todos' (partition key: /partitionKey)..."
          Invoke-CosmosApi "POST" "$endpoint/dbs/todoapp/colls" "colls" "dbs/todoapp" `
              '{"id":"todos","partitionKey":{"paths":["/partitionKey"],"kind":"Hash","Version":2}}'

          Write-Host "Test database and container are ready"

      - name: Run Cosmos DB integration tests
        shell: bash
        run: |
          mvn verify -Pemulator-cosmos -pl hyperscaledb-conformance -am \
            -Djunit.jupiter.execution.timeout.default=120s

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-test-reports
          path: '**/surefire-reports/**'
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  #  Gate 3 — DynamoDB Local (only for api and provider-dynamo)
  # ──────────────────────────────────────────────────────────
  emulator-dynamo:
    name: DynamoDB Local Tests
    runs-on: ubuntu-latest
    needs: [parse-tag]
    if: contains(fromJSON('["hyperscaledb-api","hyperscaledb-provider-dynamo"]'), needs.parse-tag.outputs.module)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Start DynamoDB Local
        run: |
          # Pull with retry + exponential backoff to handle Docker Hub rate limits
          IMAGE="amazon/dynamodb-local:2.5.3"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pulling $IMAGE..."
            if docker pull "$IMAGE" 2>&1; then
              echo "Pull succeeded"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::Failed to pull $IMAGE after 5 attempts"
              exit 1
            fi
            WAIT=$((i * 15))
            echo "Pull failed, waiting ${WAIT}s before retry..."
            sleep "$WAIT"
          done
          docker run -d --name dynamodb-local -p 8000:8000 "$IMAGE"

      - name: Wait for DynamoDB Local
        run: |
          echo "Waiting for DynamoDB Local to be ready..."
          timeout 60 bash -c '
            until curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null | grep -q "400\|200"; do
              echo "  Not ready yet, retrying in 2s..."
              sleep 2
            done
          '
          echo "DynamoDB Local is ready"

      - name: Run DynamoDB integration tests
        run: mvn verify -Pemulator-dynamo -pl hyperscaledb-conformance -am

      - name: Stop DynamoDB Local
        if: always()
        run: docker rm -f dynamodb-local 2>/dev/null || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-test-reports
          path: '**/surefire-reports/**'
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  #  Publish — runs after all applicable gates pass
  # ──────────────────────────────────────────────────────────
  publish:
    name: Publish ${{ needs.parse-tag.outputs.module }} ${{ needs.parse-tag.outputs.version }}
    runs-on: ubuntu-latest
    needs: [parse-tag, unit-tests, emulator-cosmos, emulator-dynamo]
    # Run if all non-skipped jobs succeeded
    if: |
      always() &&
      needs.parse-tag.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (needs.emulator-cosmos.result == 'success' || needs.emulator-cosmos.result == 'skipped') &&
      (needs.emulator-dynamo.result == 'success' || needs.emulator-dynamo.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Verify POM version matches tag
        run: |
          MODULE="${{ needs.parse-tag.outputs.module }}"
          EXPECTED="${{ needs.parse-tag.outputs.version }}"
          ACTUAL=$(mvn help:evaluate -pl "$MODULE" -Dexpression=project.version -q -DforceStdout)

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch: $MODULE/pom.xml has version '$ACTUAL' but tag expects '$EXPECTED'"
            echo "Update the version property in the root pom.xml and the module pom.xml before tagging."
            exit 1
          fi
          echo "Version verified: $MODULE = $EXPECTED"

      - name: Verify sibling dependencies are released versions
        run: |
          MODULE="${{ needs.parse-tag.outputs.module }}"
          # Check for any non-release versions (SNAPSHOT or other non-semver) in sibling deps
          INVALID=$(mvn dependency:list -pl "$MODULE" -DincludeScope=compile -q -DoutputFile=/dev/stdout 2>/dev/null \
            | grep "com.hyperscaledb" | grep -v -E ':[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?:' || true)

          if [ -n "$INVALID" ]; then
            echo "::error::Module $MODULE has non-release dependencies on internal modules:"
            echo "$INVALID"
            echo "Only beta (X.Y.Z-beta.N) and GA (X.Y.Z) versions are supported. Release the dependency modules first."
            exit 1
          fi
          echo "All sibling dependencies are valid release versions"

      - name: Build reactor and deploy target module
        run: |
          MODULE="${{ needs.parse-tag.outputs.module }}"
          VERSION="${{ needs.parse-tag.outputs.version }}"

          # Install full reactor to local repo (for inter-module dep resolution)
          mvn install -DskipTests -q

          # Deploy only the target module to staging
          mvn deploy -pl "$MODULE" -DskipTests \
            -DaltDeploymentRepository=local::default::file://${{ github.workspace }}/staging

      - name: Verify artifacts
        run: |
          MODULE="${{ needs.parse-tag.outputs.module }}"
          VERSION="${{ needs.parse-tag.outputs.version }}"
          ERRORS=0

          check_artifact() {
            local type=$1 path=$2
            if [ -z "$path" ]; then
              echo "::error::Missing ${MODULE} ${type} artifact"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ ${type}: $(basename "$path")"
            fi
          }

          echo "--- Checking $MODULE $VERSION ---"
          check_artifact pom     "$(find staging -path "*/${MODULE}/*.pom" 2>/dev/null | head -1)"
          check_artifact jar     "$(find staging -path "*/${MODULE}/*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1)"
          check_artifact sources "$(find staging -path "*/${MODULE}/*-sources.jar" 2>/dev/null | head -1)"
          check_artifact javadoc "$(find staging -path "*/${MODULE}/*-javadoc.jar" 2>/dev/null | head -1)"

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} required artifact(s) missing"
            exit 1
          fi
          echo ""
          echo "All artifacts verified for $MODULE $VERSION"

      - name: Collect release JARs
        run: |
          MODULE="${{ needs.parse-tag.outputs.module }}"
          VERSION="${{ needs.parse-tag.outputs.version }}"
          mkdir -p release-jars
          cp "$MODULE/target/$MODULE-$VERSION.jar" release-jars/
          cp "$MODULE/target/$MODULE-$VERSION-sources.jar" release-jars/
          cp "$MODULE/target/$MODULE-$VERSION-javadoc.jar" release-jars/
          echo "Release JARs:"
          ls -la release-jars/

      - name: Upload staging repository
        uses: actions/upload-artifact@v4
        with:
          name: maven-staging-${{ needs.parse-tag.outputs.module }}-${{ needs.parse-tag.outputs.version }}
          path: staging/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.parse-tag.outputs.tag }}
          name: "${{ needs.parse-tag.outputs.module }} ${{ needs.parse-tag.outputs.version }}"
          generate_release_notes: true
          files: release-jars/*
          fail_on_unmatched_files: true
