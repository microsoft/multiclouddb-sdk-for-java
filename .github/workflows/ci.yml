name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build, Unit Tests & Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        run: mvn verify -Punit

      - name: Stage release artifacts
        run: |
          mvn deploy -DskipTests \
            -DaltDeploymentRepository=local::default::file://${{ github.workspace }}/staging

      - name: Verify required artifacts
        run: |
          # Modules that produce .pom + .jar + -sources.jar + -javadoc.jar
          FULL_MODULES="hyperscaledb-api hyperscaledb-provider-cosmos hyperscaledb-provider-dynamo hyperscaledb-provider-spanner"
          # Modules that only produce .pom + .jar (no sources)
          MINIMAL_MODULES="hyperscaledb-spi"
          ERRORS=0

          check_artifact() {
            local module=$1 type=$2 path=$3
            if [ -z "$path" ]; then
              echo "::error::Missing ${module} ${type} artifact"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ ${type}: $(basename "$path")"
            fi
          }

          for module in $FULL_MODULES; do
            echo "--- Checking $module (full) ---"
            check_artifact "$module" pom    "$(find staging -path "*/${module}/*.pom" 2>/dev/null | head -1)"
            check_artifact "$module" jar    "$(find staging -path "*/${module}/*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1)"
            check_artifact "$module" sources "$(find staging -path "*/${module}/*-sources.jar" 2>/dev/null | head -1)"
            check_artifact "$module" javadoc "$(find staging -path "*/${module}/*-javadoc.jar" 2>/dev/null | head -1)"
          done

          for module in $MINIMAL_MODULES; do
            echo "--- Checking $module (minimal) ---"
            check_artifact "$module" pom "$(find staging -path "*/${module}/*.pom" 2>/dev/null | head -1)"
            check_artifact "$module" jar "$(find staging -path "*/${module}/*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1)"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} required artifact(s) missing"
            exit 1
          fi
          echo ""
          echo "All required artifacts verified successfully"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: staging/
          retention-days: 30

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7

  emulator-cosmos:
    name: Cosmos DB Emulator Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Start Azure Cosmos DB Emulator
        shell: pwsh
        run: |
          Write-Host "Launching Azure Cosmos DB Emulator"
          Import-Module "$env:ProgramFiles\Azure Cosmos DB Emulator\PSModules\Microsoft.Azure.CosmosDB.Emulator"
          Start-CosmosDbEmulator -NoUI -Key "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          Write-Host "Cosmos DB Emulator is running"

      - name: Import emulator cert into Java truststore
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tools | Out-Null
          Copy-Item "$env:JAVA_HOME\lib\security\cacerts" .tools\cacerts-local
          # Export the emulator's self-signed cert from the Windows cert store
          $cert = Get-ChildItem Cert:\LocalMachine\My |
                  Where-Object { $_.FriendlyName -like '*Cosmos*' -or $_.Subject -match 'localhost' } |
                  Select-Object -First 1
          if (-not $cert) {
            Write-Error "Cosmos DB Emulator certificate not found in cert store"
            exit 1
          }
          $certPath = ".tools\cosmos_emulator.cer"
          [System.IO.File]::WriteAllBytes($certPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          Write-Host "Exported certificate: $($cert.Subject)"
          & "$env:JAVA_HOME\bin\keytool" -importcert -noprompt -alias cosmosEmulatorCert `
            -file $certPath `
            -keystore .tools\cacerts-local `
            -storepass changeit

      - name: Run Cosmos DB integration tests
        shell: bash
        run: mvn verify -Pemulator-cosmos -pl hyperscaledb-conformance -am

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7

  emulator-dynamo:
    name: DynamoDB Local Tests
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Wait for DynamoDB Local
        run: |
          echo "Waiting for DynamoDB Local to be ready..."
          timeout 60 bash -c '
            until curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null | grep -q "400\|200"; do
              echo "  Not ready yet, retrying in 2s..."
              sleep 2
            done
          '
          echo "DynamoDB Local is ready"

      - name: Run DynamoDB integration tests
        run: mvn verify -Pemulator-dynamo -pl hyperscaledb-conformance -am

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-test-reports
          path: '**/surefire-reports/**'
          retention-days: 7
